<h2>To-Do Counter Challenge</h2>
<p>Tasks Left: {{ tasksLeft() }}</p>
<button (click)="completeTask()">Complete Task</button>
<button (click)="addTask()">Add Task</button>
<button (click)="resetTasks()">Reset</button>
@if (tasksLeft() <= 0 )
{ 
    <p>You have no more task</p>
}
@else
{
      <p>You still have work to do</p>
    }
